name: 🔍 AgentWallet Monitor

on:
  schedule:
    # Every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable debug output"
        required: false
        default: "false"

permissions:
  contents: write   # needed to commit status.json back to repo
  pages: write
  id-token: write

jobs:
  monitor:
    name: Run Feature Tests
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ──────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # NO cache: pip — avoids "no requirements.txt found" error

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          pip install requests --quiet

      # ── 4. Run monitor script ─────────────────────────────────
      - name: Run AgentWallet Monitor
        env:
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/monitor.py

      # ── 5. Commit results to repo (docs/) ─────────────────────
      - name: Commit status results
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull latest to avoid push conflict
          git pull --rebase origin main || git pull --rebase origin master || true
          git add docs/status.json docs/history.json
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 monitor: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push origin HEAD
          fi

      # ── 6. Upload run artifact (optional debug) ───────────────
      - name: Upload status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-status-${{ github.run_number }}
          path: docs/status.json
          if-no-files-found: warn
          retention-days: 7

  # ── Optional: re-deploy GitHub Pages if docs changed ─────────
  deploy-pages:
    name: Deploy GitHub Pages
    needs: monitor
    if: always()
    runs-on: ubuntu-latest
    # Only deploy pages when triggered on main/master branch
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # always get latest commit (with status.json)
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
