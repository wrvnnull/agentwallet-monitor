name: 🔍 AgentWallet Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    name: Run Feature Tests
    runs-on: ubuntu-latest
    timeout-minutes: 4
    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run AgentWallet Monitor
        env:
          AGENTWALLET_USERNAME: ${{ secrets.AGENTWALLET_USERNAME }}
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/monitor.py

      - name: Commit & push status results
        id: commit
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || git pull --rebase origin master || true
          git add docs/status.json docs/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            git commit -m "📊 monitor: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push origin HEAD
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

  deploy-pages:
    name: Deploy GitHub Pages
    needs: monitor      # waits for monitor to finish + commit
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Checkout AFTER monitor has committed — gets fresh status.json
      - name: Checkout latest (post-monitor)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
