<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentWallet Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #09090f;
      --surface:   #111120;
      --surface2:  #181830;
      --border:    #2a2a50;
      --accent:    #6c63ff;
      --accent2:   #00e5a0;
      --warn:      #f5a623;
      --danger:    #ff4d6d;
      --text:      #e8e8ff;
      --muted:     #6868a8;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(108,99,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }
    .logo { font-family: var(--sans); font-weight: 800; font-size: 1.4rem; letter-spacing: -0.02em; }
    .logo span { color: var(--accent); }
    .logo-sub { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .header-right { text-align: right; font-size: .75rem; color: var(--muted); }
    #last-updated { color: var(--accent2); }

    /* ── Pill badge ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .7rem; font-weight: 600; padding: 3px 10px;
      border-radius: 100px; letter-spacing: .05em; text-transform: uppercase;
    }
    .badge.pass  { background: rgba(0,229,160,.12); color: var(--accent2); border: 1px solid rgba(0,229,160,.3); }
    .badge.fail  { background: rgba(255,77,109,.12); color: var(--danger);  border: 1px solid rgba(255,77,109,.3); }
    .badge.warn  { background: rgba(245,166,35,.12); color: var(--warn);    border: 1px solid rgba(245,166,35,.3); }
    .badge.info  { background: rgba(108,99,255,.12); color: var(--accent);  border: 1px solid rgba(108,99,255,.3); }

    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot.pass  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .dot.fail  { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
    .dot.warn  { background: var(--warn);    box-shadow: 0 0 6px var(--warn); }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color .2s;
    }
    .card:hover { border-color: var(--accent); }
    .card-label { font-size: .68rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
    .card-value { font-family: var(--sans); font-size: 2rem; font-weight: 800; line-height: 1; }
    .card-value.green { color: var(--accent2); }
    .card-value.red   { color: var(--danger); }
    .card-value.gold  { color: var(--warn); }
    .card-value.purple{ color: var(--accent); }

    /* ── Section heading ── */
    h2 {
      font-family: var(--sans); font-size: .85rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--muted); margin: 28px 0 12px;
      display: flex; align-items: center; gap: 8px;
    }
    h2::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Test table ── */
    .test-table { width: 100%; border-collapse: collapse; }
    .test-table th {
      text-align: left; font-size: .65rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
    }
    .test-table td { padding: 9px 12px; font-size: .78rem; border-bottom: 1px solid rgba(42,42,80,.5); vertical-align: top; }
    .test-table tr:hover td { background: rgba(108,99,255,.04); }
    .test-table tr:last-child td { border-bottom: none; }

    .test-name { color: var(--text); }
    .test-cat  { color: var(--muted); font-size: .68rem; }
    .test-dur  { color: var(--muted); font-size: .72rem; text-align: right; white-space: nowrap; }
    .test-err  { color: var(--danger); font-size: .7rem; word-break: break-all; }
    .test-data {
      color: var(--muted); font-size: .68rem;
      max-width: 320px; word-break: break-word;
      max-height: 3.5em; overflow: hidden;
    }

    /* ── History sparkline ── */
    .history-wrap { overflow: hidden; }
    .spark-row { display: flex; gap: 3px; align-items: flex-end; height: 40px; }
    .spark-bar {
      flex: 1; min-width: 6px; border-radius: 3px 3px 0 0;
      transition: opacity .15s;
      cursor: default;
    }
    .spark-bar.pass { background: var(--accent2); }
    .spark-bar.fail { background: var(--danger); }
    .spark-bar.partial { background: var(--warn); }
    .spark-bar:hover { opacity: .7; }

    /* ── Meta strip ── */
    .meta-strip {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 20px;
    }
    .meta-chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 12px; font-size: .72rem;
    }
    .meta-chip .k { color: var(--muted); }
    .meta-chip .v { color: var(--accent2); margin-left: 4px; }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 80px 20px; color: var(--muted); }
    .loading-spin {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(255,77,109,.08); border: 1px solid rgba(255,77,109,.3);
      border-radius: 10px; padding: 20px; text-align: center; color: var(--danger);
      font-size: .85rem;
    }

    /* ── Refresh countdown ── */
    .refresh-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 3px; background: var(--border);
    }
    #refresh-progress {
      height: 100%; background: var(--accent);
      transition: width 1s linear;
    }
    .refresh-label {
      position: fixed; bottom: 8px; right: 16px;
      font-size: .65rem; color: var(--muted);
    }

    /* ── Category color dots ── */
    .cat-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
    .cat-meta      { background: #8888ff; }
    .cat-public    { background: #44aaff; }
    .cat-wallet    { background: #00e5a0; }
    .cat-policy    { background: #f5a623; }
    .cat-x402      { background: #ff79c6; }
    .cat-actions   { background: #bd93f9; }
    .cat-feedback  { background: #ff6e6e; }
    .cat-referrals { background: #50fa7b; }

    @media (max-width: 600px) {
      .card-value { font-size: 1.5rem; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      header { flex-direction: column; gap: 8px; align-items: flex-start; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="logo">Agent<span>Wallet</span> Monitor</div>
      <div class="logo-sub">Full-feature automated test suite · GitHub Actions</div>
    </div>
    <div class="header-right">
      Auto-refresh in <span id="countdown">60</span>s<br>
      Last: <span id="last-updated">—</span>
    </div>
  </header>

  <div id="app">
    <div class="loading">
      <div class="loading-spin"></div>
      Loading status…
    </div>
  </div>

</div>

<div class="refresh-bar"><div id="refresh-progress" style="width:100%"></div></div>
<div class="refresh-label">Refreshing in <span id="countdown2">60</span>s</div>

<script>
const REFRESH_SEC = 60;

// ── Category colours
const CAT_CLS = {
  meta:'cat-meta', public:'cat-public', wallet:'cat-wallet',
  policy:'cat-policy', x402:'cat-x402', actions:'cat-actions',
  feedback:'cat-feedback', referrals:'cat-referrals'
};

function fmt(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'UTC'}) + ' UTC';
}

function statusIcon(s) {
  if (s === 'pass') return '<span class="dot pass"></span>';
  if (s === 'fail') return '<span class="dot fail"></span>';
  return '<span class="dot warn"></span>';
}

function safeJson(d) {
  if (!d) return '';
  try {
    const s = JSON.stringify(d);
    return s.length > 200 ? s.slice(0,200)+'…' : s;
  } catch { return String(d); }
}

function renderHistory(history) {
  if (!history || !history.length) return '';
  const max = Math.max(...history.map(h => h.passed + h.failed + h.warnings), 1);
  const bars = [...history].reverse().map(h => {
    const total = h.passed + h.failed + h.warnings || 1;
    const pct = Math.max(8, Math.round((total / max) * 36));
    const cls = h.failed > 0 ? 'fail' : h.warnings > 0 ? 'partial' : 'pass';
    const tip = `${fmt(h.timestamp)}\n✅${h.passed} ❌${h.failed} ⚠️${h.warnings}`;
    return `<div class="spark-bar ${cls}" style="height:${pct}px" title="${tip}"></div>`;
  }).join('');
  return `
    <h2>Run History (last ${history.length})</h2>
    <div class="history-wrap">
      <div class="spark-row">${bars}</div>
      <div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-top:4px;">
        <span>oldest</span><span>latest</span>
      </div>
    </div>`;
}

function renderMeta(meta) {
  const chips = [];
  if (meta.skill_version) chips.push(`<div class="meta-chip"><span class="k">skill</span><span class="v">v${meta.skill_version}</span></div>`);
  if (meta.balance_usd !== null && meta.balance_usd !== undefined)
    chips.push(`<div class="meta-chip"><span class="k">balance</span><span class="v">$${meta.balance_usd} USDC</span></div>`);
  if (meta.rank) chips.push(`<div class="meta-chip"><span class="k">rank</span><span class="v">#${meta.rank}</span></div>`);
  if (meta.tier) chips.push(`<div class="meta-chip"><span class="k">tier</span><span class="v">${meta.tier}</span></div>`);
  if (meta.airdrop_points !== null && meta.airdrop_points !== undefined)
    chips.push(`<div class="meta-chip"><span class="k">airdrop pts</span><span class="v">${meta.airdrop_points}</span></div>`);
  if (meta.referral_count !== null && meta.referral_count !== undefined)
    chips.push(`<div class="meta-chip"><span class="k">referrals</span><span class="v">${meta.referral_count}</span></div>`);
  return chips.length ? `<div class="meta-strip">${chips.join('')}</div>` : '';
}

function render(status, history) {
  const s = status.summary;
  const overall = s.overall === 'pass' ? 'pass' : 'fail';
  const overallLabel = overall === 'pass' ? '● ALL PASSING' : '✖ FAILURES DETECTED';

  const rows = status.tests.map(t => {
    const catDot = `<span class="cat-dot ${CAT_CLS[t.category]||''}"></span>`;
    const errHtml = t.error ? `<div class="test-err">${t.error}</div>` : '';
    const dataHtml = t.data ? `<div class="test-data">${safeJson(t.data)}</div>` : '';
    return `<tr>
      <td>${statusIcon(t.status)}</td>
      <td><div class="test-name">${t.name}</div></td>
      <td><div class="test-cat">${catDot}${t.category}</div></td>
      <td>${errHtml}${dataHtml}</td>
      <td class="test-dur">${t.duration_ms}ms</td>
    </tr>`;
  }).join('');

  document.getElementById('last-updated').textContent = fmt(status.timestamp);

  return `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;">
      <span class="badge ${overall}">${overallLabel}</span>
      <span class="badge info">user: ${status.username}</span>
    </div>

    ${renderMeta(status.meta || {})}

    <div class="summary-grid">
      <div class="card">
        <div class="card-label">Total Tests</div>
        <div class="card-value purple">${s.total}</div>
      </div>
      <div class="card">
        <div class="card-label">Passed</div>
        <div class="card-value green">${s.passed}</div>
      </div>
      <div class="card">
        <div class="card-label">Failed</div>
        <div class="card-value ${s.failed > 0 ? 'red' : 'green'}">${s.failed}</div>
      </div>
      <div class="card">
        <div class="card-label">Warnings</div>
        <div class="card-value ${s.warnings > 0 ? 'gold' : 'green'}">${s.warnings}</div>
      </div>
    </div>

    ${renderHistory(history)}

    <h2>Test Results</h2>
    <div style="overflow-x:auto;">
      <table class="test-table">
        <thead>
          <tr>
            <th></th>
            <th>Test Name</th>
            <th>Category</th>
            <th>Details</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ── Fetch and render
async function loadData() {
  const app = document.getElementById('app');
  try {
    // Cache-bust with timestamp
    const [sRes, hRes] = await Promise.all([
      fetch(`status.json?t=${Date.now()}`),
      fetch(`history.json?t=${Date.now()}`).catch(() => ({ ok:false }))
    ]);
    if (!sRes.ok) throw new Error(`HTTP ${sRes.status}`);
    const status  = await sRes.json();
    const history = hRes.ok ? await hRes.json() : [];
    app.innerHTML = render(status, history);
  } catch(e) {
    app.innerHTML = `<div class="error-box">
      ⚠️ Could not load status.json<br>
      <small style="color:var(--muted);margin-top:8px;display:block">${e.message}</small>
      <small style="color:var(--muted)">Make sure GitHub Actions has run at least once and GitHub Pages is enabled on the <strong>docs/</strong> folder.</small>
    </div>`;
  }
}

// ── Refresh countdown
let remaining = REFRESH_SEC;
const prog = document.getElementById('refresh-progress');
const cd1  = document.getElementById('countdown');
const cd2  = document.getElementById('countdown2');

function tick() {
  remaining--;
  cd1.textContent = remaining;
  cd2.textContent = remaining;
  prog.style.width = (remaining / REFRESH_SEC * 100) + '%';
  if (remaining <= 0) {
    remaining = REFRESH_SEC;
    loadData();
  }
}

loadData();
setInterval(tick, 1000);
</script>
</body>
</html>
